openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: invoices
    description: Invoice operations
  - name: customers
    description: Customer operations
  - name: products
    description: Product operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /invoices:
    get:
      operationId: listInvoices
      tags: [invoices]
      summary: List invoices
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Search by invoice number or customer name
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/InvoiceStatus"
          description: Filter by invoice status
        - name: dateFrom
          in: query
          required: false
          schema:
            type: string
          description: Filter invoices from this date (inclusive, YYYY-MM-DD)
        - name: dateTo
          in: query
          required: false
          schema:
            type: string
          description: Filter invoices to this date (inclusive, YYYY-MM-DD)
      responses:
        "200":
          description: List of invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invoice"
    post:
      operationId: createInvoice
      tags: [invoices]
      summary: Create invoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvoiceBody"
      responses:
        "201":
          description: Created invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /invoices/next-number:
    get:
      operationId: getNextInvoiceNumber
      tags: [invoices]
      summary: Get next invoice number
      description: Returns the next auto-generated invoice number in AZ-YYMM-### format
      responses:
        "200":
          description: Next invoice number
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NextInvoiceNumber"

  /invoices/{id}:
    get:
      operationId: getInvoice
      tags: [invoices]
      summary: Get invoice by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateInvoice
      tags: [invoices]
      summary: Update invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvoiceBody"
      responses:
        "200":
          description: Updated invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteInvoice
      tags: [invoices]
      summary: Delete invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: List customers
      responses:
        "200":
          description: List of customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Create customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerBody"
      responses:
        "201":
          description: Created customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{id}:
    put:
      operationId: updateCustomer
      tags: [customers]
      summary: Update customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerBody"
      responses:
        "200":
          description: Updated customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteCustomer
      tags: [customers]
      summary: Delete customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductBody"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    put:
      operationId: updateProduct
      tags: [products]
      summary: Update product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductBody"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    NextInvoiceNumber:
      type: object
      properties:
        invoiceNumber:
          type: string
      required:
        - invoiceNumber

    DiscountType:
      type: string
      enum: [percent, amount]

    InvoiceItem:
      type: object
      properties:
        id:
          type: integer
        invoiceId:
          type: integer
        itemName:
          type: string
        qty:
          type: number
        price:
          type: number
        discount:
          type: number
        discountType:
          $ref: '#/components/schemas/DiscountType'
        total:
          type: number
      required:
        - id
        - invoiceId
        - itemName
        - qty
        - price
        - discount
        - discountType
        - total

    InvoiceItemInput:
      type: object
      properties:
        itemName:
          type: string
        qty:
          type: number
        price:
          type: number
        discount:
          type: number
        discountType:
          $ref: '#/components/schemas/DiscountType'
      required:
        - itemName
        - qty
        - price
        - discount

    InvoiceStatus:
      type: string
      enum: [draft, unpaid, paid, overdue]

    Invoice:
      type: object
      properties:
        id:
          type: integer
        invoiceNumber:
          type: string
        date:
          type: string
        customerName:
          type: string
        customerAddress:
          type: string
        subtotal:
          type: number
        grandTotal:
          type: number
        isDraft:
          type: boolean
        status:
          $ref: "#/components/schemas/InvoiceStatus"
        createdAt:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/InvoiceItem"
      required:
        - id
        - invoiceNumber
        - date
        - customerName
        - customerAddress
        - subtotal
        - grandTotal
        - isDraft
        - status
        - createdAt
        - items

    CreateInvoiceBody:
      type: object
      properties:
        invoiceNumber:
          type: string
        date:
          type: string
        customerName:
          type: string
        customerAddress:
          type: string
        isDraft:
          type: boolean
        status:
          $ref: "#/components/schemas/InvoiceStatus"
        items:
          type: array
          items:
            $ref: "#/components/schemas/InvoiceItemInput"
      required:
        - invoiceNumber
        - date
        - customerName
        - customerAddress
        - isDraft
        - status
        - items

    Customer:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        address:
          type: string
        createdAt:
          type: string
      required:
        - id
        - name
        - address
        - createdAt

    CreateCustomerBody:
      type: object
      properties:
        name:
          type: string
        address:
          type: string
      required:
        - name
        - address

    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        defaultPrice:
          type: number
        createdAt:
          type: string
      required:
        - id
        - name
        - defaultPrice
        - createdAt

    CreateProductBody:
      type: object
      properties:
        name:
          type: string
        defaultPrice:
          type: number
      required:
        - name
        - defaultPrice
